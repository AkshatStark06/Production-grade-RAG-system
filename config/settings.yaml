embedding:
  model_name: sentence-transformers/all-MiniLM-L6-v2

vector_store:
  path: data/faiss_index
  top_k: 5

bm25:
  enabled: true

llm:
  model_name: "google/flan-t5-large"
  max_input_length: 512
  max_output_length: 300   # ⬅ increase from 150
  temperature: 0.3

chunking:
  chunk_size: 200
  overlap: 50

retrieval:
  top_k: 5

reranker:
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k: 5

prompt:
  active: summarization_v7

mode: "local"   # change to "ci" later in GitHub if needed

retrieval:
  top_k: 5

ci_retrieval:
  top_k: 3